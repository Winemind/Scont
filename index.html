<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-title" content="Scontrino">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg:#F7F3ED;--card:#FFFFFF;--ink:#1C1917;--ink2:#78716C;--ink3:#A8A29E;
  --border:#E7E0D8;--terra:#C2571A;--terra2:#E8825A;--wine:#7C2D3F;
  --wine-bg:#FDF2F4;--food:#2D6A4F;--food-bg:#F0FAF5;--disc:#1D4ED8;
  --disc-bg:#EFF6FF;--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh;padding-bottom:60px}
.header{background:var(--ink);padding:20px 20px 18px;text-align:center}
.header h1{font-family:'Lora',serif;font-size:1.5rem;color:#F7F3ED}
.header h1 em{color:var(--terra2);font-style:normal}
.header p{font-size:.7rem;color:#78716C;margin-top:3px;letter-spacing:.08em;text-transform:uppercase}
.wrap{max-width:480px;margin:0 auto;padding:0 14px}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:18px;margin-top:14px}
.card-title{font-family:'Lora',serif;font-size:1rem;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.badge{background:var(--terra);color:#fff;width:22px;height:22px;border-radius:50%;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.upload-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.upload-btn{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:14px 6px;background:var(--bg);border:1.5px dashed var(--border);border-radius:12px;cursor:pointer;transition:border-color .15s,background .15s;overflow:hidden}
.upload-btn:active{background:#EDE8E0;border-color:var(--terra)}
.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:100px}
.upload-btn .ico{font-size:1.6rem;line-height:1}
.upload-btn .lbl{font-size:.65rem;font-weight:500;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em}
.sep{text-align:center;color:var(--ink3);font-size:.72rem;margin:12px 0 8px;position:relative}
.sep::before,.sep::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.sep::before{left:0}.sep::after{right:0}
.btn-ghost{width:100%;padding:10px;background:transparent;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--ink2);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}
.btn-ghost:hover{border-color:var(--terra);color:var(--terra)}
.status-bar{display:none;margin-top:12px;background:var(--ink);color:#F7F3ED;border-radius:12px;padding:11px 14px;font-size:.8rem;align-items:center;gap:10px}
.status-bar.on{display:flex}
.spin{width:16px;height:16px;flex-shrink:0;border:2px solid rgba(247,243,237,.15);border-top-color:var(--terra2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rows-section{display:none}.rows-section.on{display:block}
.rows-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rows-hint{font-size:.7rem;color:var(--ink3)}
.rows-count{font-size:.7rem;color:var(--ink2);background:var(--bg);padding:3px 8px;border-radius:20px;border:1px solid var(--border)}
.row{display:flex;align-items:center;gap:6px;padding:9px 0;border-bottom:1px solid var(--border);animation:fadeUp .25s ease both}
.row:last-child{border-bottom:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.row-desc{flex:1;font-size:.84rem;color:var(--ink);background:transparent;border:none;font-family:'DM Sans',sans-serif;padding:3px 4px;border-radius:6px;min-width:0}
.row-desc:focus{outline:none;background:var(--bg)}
.row-price{width:62px;font-size:.84rem;font-weight:500;text-align:right;background:transparent;border:none;font-family:'DM Sans',sans-serif;padding:3px 4px;border-radius:6px}
.row-price:focus{outline:none;background:var(--bg)}
.row-price.neg{color:var(--disc)}
.tag{padding:3px 9px;border-radius:20px;font-size:.63rem;font-weight:500;letter-spacing:.02em;cursor:pointer;border:none;white-space:nowrap;flex-shrink:0;transition:all .15s}
.tag.wine{background:var(--wine-bg);color:var(--wine)}
.tag.wine.on{background:var(--wine);color:#fff}
.tag.food{background:var(--food-bg);color:var(--food)}
.tag.food.on{background:var(--food);color:#fff}
.tag.disc{background:var(--disc-bg);color:var(--disc);cursor:default}
.row-del{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:.85rem;padding:2px 3px;border-radius:4px;transition:color .15s;flex-shrink:0}
.row-del:hover{color:var(--terra)}
.uncertain .row-desc,.uncertain .row-price{background:#FFFBEB;border-radius:6px}
.add-row{width:100%;margin-top:8px;padding:8px;background:transparent;border:1.5px dashed var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.76rem;color:var(--ink3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.add-row:hover{border-color:var(--terra);color:var(--terra)}
.btn-primary{width:100%;padding:14px;margin-top:12px;background:var(--terra);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary:active{background:#A8431A;transform:scale(.99)}
.result-section{display:none}.result-section.on{display:block}
.totals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.total-box{padding:14px;border-radius:12px;text-align:center}
.total-box.wine{background:var(--wine-bg)}.total-box.food{background:var(--food-bg)}.total-box.disc{background:var(--disc-bg);grid-column:1/-1}
.total-box .lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:4px}
.total-box.wine .lbl{color:var(--wine)}.total-box.food .lbl{color:var(--food)}.total-box.disc .lbl{color:var(--disc)}
.total-box .val{font-family:'Lora',serif;font-size:1.4rem;font-weight:600}
.total-box.wine .val{color:var(--wine)}.total-box.food .val{color:var(--food)}.total-box.disc .val{color:var(--disc)}
.persona-list{display:flex;flex-direction:column;gap:8px}
.persona{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;background:var(--bg);border:1.5px solid var(--border)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:1rem;font-weight:600;color:#fff;flex-shrink:0}
.av-a{background:var(--terra)}.av-b{background:var(--wine)}.av-c{background:var(--food)}
.persona-info{flex:1}
.persona-name{font-size:.84rem;font-weight:500}
.persona-sub{font-size:.68rem;color:var(--ink3);margin-top:1px}
.persona-amt{font-family:'Lora',serif;font-size:1.2rem;font-weight:600}
.grand{background:var(--ink);color:#F7F3ED;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.grand .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#78716C}
.grand .sub{font-size:.72rem;color:#57534E;margin-top:2px}
.grand .val{font-family:'Lora',serif;font-size:1.45rem;font-weight:600;color:var(--terra2)}
.legend{font-size:.68rem;color:var(--ink3);text-align:center;line-height:1.6;padding:10px;background:var(--bg);border-radius:8px;margin-top:10px}
.manual-box{display:none;margin-bottom:12px}.manual-box.on{display:block}
.manual-note{background:#FFFBEB;border-radius:10px;padding:10px 12px;font-size:.76rem;color:#92400E;margin-bottom:8px;line-height:1.5}
.manual-box textarea{width:100%;height:120px;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--ink);background:var(--bg);resize:vertical;outline:none;display:block}
.manual-box textarea:focus{border-color:var(--terra)}
.img-preview{width:100%;max-height:140px;object-fit:cover;border-radius:10px;margin-top:10px;display:none}
.img-preview.on{display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#F7F3ED;padding:9px 18px;border-radius:24px;font-size:.78rem;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header">
  <h1>🍽 Dividi <em>Scontrino</em></h1>
  <p>Divisione automatica del conto &nbsp;·&nbsp; <span style="color:var(--terra2);font-weight:500">v2.3</span></p>
</div>
<div class="wrap">
  <div class="card">
    <div class="card-title"><span class="badge">1</span> Carica lo scontrino</div>
    <div class="upload-row">
      <label class="upload-btn"><span class="ico">📄</span><span class="lbl">PDF</span><input type="file" id="inPdf" accept="application/pdf"></label>
      <label class="upload-btn"><span class="ico">🖼</span><span class="lbl">Immagine</span><input type="file" id="inImg" accept="image/*"></label>
      <label class="upload-btn"><span class="ico">📷</span><span class="lbl">Foto</span><input type="file" id="inCam" accept="image/*" capture="environment"></label>
    </div>
    <img id="preview" class="img-preview">
    <div class="sep">oppure</div>
    <button class="btn-ghost" style="border-color:#C2571A;color:#C2571A;font-weight:500" onclick="showPaste()">📋 Incolla testo scontrino</button>
    <button class="btn-ghost" onclick="loadDemo()">🧾 Scontrino di esempio</button>
    <button class="btn-ghost" onclick="setKey()">🔑 API key Anthropic</button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spin"></div>
    <span id="statusMsg">Elaborazione…</span>
  </div>

  <div class="card rows-section" id="rowsSection">
    <div class="card-title"><span class="badge">2</span> Voci estratte</div>
    <div class="rows-header">
      <span class="rows-hint">Tocca per modificare · 🍷 vino · 🥗 cibo</span>
      <span class="rows-count" id="rowsCount">0</span>
    </div>
    <div class="manual-box" id="manualBox">
      <div class="manual-note" id="manualNote">⚠️ Inserisci le voci manualmente (es: Pasta 9.50)</div>
      <textarea id="manualText" placeholder="Pasta al pomodoro 9.50&#10;Vino rosso 8.00&#10;Acqua 2.50"></textarea>
      <button class="btn-primary" style="margin-top:8px" onclick="parseManual()">📋 Analizza testo</button>
    </div>
    <div id="rowsList"></div>
    <button class="add-row" onclick="addRow()">＋ Aggiungi voce</button>
    <button class="btn-primary" onclick="calcola()">🔢 Calcola divisione</button>
  </div>

  <div class="card result-section" id="resultSection">
    <div class="card-title"><span class="badge">3</span> Riepilogo</div>

    <div class="grand" id="grand"></div>
    <div class="legend"><strong>A &amp; B</strong> pagano cibo ÷ 3 + vino ÷ 2 &nbsp;·&nbsp; <strong>C</strong> paga solo cibo ÷ 3</div>
    <button class="btn-ghost" style="margin-top:12px" onclick="reset()">🔄 Riparti da capo</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// Cattura qualsiasi errore JS e lo mostra
window.onerror = function(msg, src, line){
  alert('Errore JS: ' + msg + ' (riga ' + line + ')');
  return false;
};
window.onunhandledrejection = function(e){
  alert('Errore async: ' + (e.reason?.message || e.reason || 'sconosciuto'));
};

pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let rows=[];
const getKey=()=>localStorage.getItem('ak')||'';
const saveKey=k=>localStorage.setItem('ak',k.trim());

function setKey(){
  const k=prompt('Incolla la tua API key Anthropic\n(console.anthropic.com → API Keys)',getKey());
  if(k!==null){saveKey(k);toast('🔑 API key salvata');}
}

async function onFile(input,type){
  const file=input.files[0];if(!file)return;
  if(type==='img'){
    const p=document.getElementById('preview');
    p.src=URL.createObjectURL(file);p.classList.add('on');
    await analyzeImage(file);
  } else {
    document.getElementById('preview').classList.remove('on');
    await analyzePDF(file);
  }
  input.value='';
}

// ── UTILITY FUNCTIONS ──
async function compress(file, maxPx=1800, q=0.88){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let{width:w,height:h}=img;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(resolve,'image/jpeg',q);
    };
    img.onerror=()=>resolve(file);
    img.src=url;
  });
}

function toBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

const PROMPT=`Analizza questo scontrino italiano. Rispondi SOLO con un array JSON grezzo, zero testo aggiuntivo.

Formato: [{"desc":"Nome","price":9.50,"isWine":false}]

STRUTTURA SCONTRINO PAM (3 colonne: NOME  IVA%  PREZZO):
- Il prezzo e' l'ULTIMO numero della riga. La colonna IVA (22,00% ecc) va ignorata.
- Virgola in punto: 8,45 -> 8.45
- Righe in grassetto con prezzo NEGATIVO = sconti. Includili con price negativo: -1.90
- Rimuovi prefisso lettera singola iniziale (T, C, X) se seguito da spazio
- Testo leggibile, non tutto maiuscolo

isWine:true per: Montepulciano, Friulano, Chianti, Barolo, Brunello, Prosecco, Lambrusco,
Merlot, Cabernet, Sangiovese, Pinot, Vermentino, Soave, Amarone, Primitivo, Verdicchio,
Moscato, Barbera + DOC/DOCG/IGT + Birra/Beer/Lager/IPA + Grappa/Amaro/Gin/Vodka/Rum/Whisky/Limoncello/Aperol/Campari

NON includere: Totale, Subtotale, IVA, Pagamento, Contanti, Carta, Resto, Raccolta punti, Saldo, P.IVA, barcode

Esempio:
"FRIULANO MARGHE   22,00%   -1,90" -> {"desc":"Sconto Friulano","price":-1.90,"isWine":false}
"MONTEPULCIANO MASC   22,00%   8,45" -> {"desc":"Montepulciano Masciarelli","price":8.45,"isWine":true}
"T MOLISANA PASSATA   4,00%   1,50" -> {"desc":"Molisana passata","price":1.50,"isWine":false}\`;

async function analyzePDF(file){
  try{
    setStatus('Lettura PDF…');
    const ab  = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:ab}).promise;
    let text = '';
    for(let i=1;i<=pdf.numPages;i++){
      const page    = await pdf.getPage(i);
      const content = await page.getTextContent();
      // Ricostruisce le righe mantenendo la struttura spaziale
      const items = content.items;
      let lastY = null;
      for(const item of items){
        const y = Math.round(item.transform[5]);
        if(lastY !== null && Math.abs(y - lastY) > 3) text += '\n';
        text += item.str + ' ';
        lastY = y;
      }
      text += '\n';
    }
    setStatus('Analisi testo…');
    const parsed = parseReceiptText(text);
    if(parsed.length === 0){ showManual('Nessuna voce trovata. Incolla il testo manualmente.'); return; }
    rows = parsed;
    await classifyWines();
  }catch(e){
    noStatus();
    console.error(e);
    showManual('Errore PDF: ' + e.message);
  }
}

async function analyzeImage(file){
  let key = getKey();
  if(!key){
    const k = prompt('Inserisci la tua API key Anthropic:');
    if(!k){ showManual('API key necessaria per analizzare immagini.'); return; }
    saveKey(k); key = k.trim();
  }
  try{
    setStatus('Compressione immagine…');
    const comp = await compress(file);
    const mb   = (comp.size/1024/1024).toFixed(1);
    const b64  = await toBase64(comp);
    setStatus('Analisi con Claude AI… (' + mb + ' MB)');
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:2048,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
          {type:'text',text:PROMPT}
        ]}]
      })
    });
    if(resp.status===401){saveKey('');noStatus();showManual('API key non valida.');return;}
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e?.error?.message||'HTTP '+resp.status);}
    const data = await resp.json();
    const text = (data.content||[]).map(b=>b.text||'').join('\n').trim();
    parseClaudeResponse(text);
  }catch(e){
    noStatus();
    console.error(e);
    showManual('Errore: '+(e.message||'rete')+'. Inserisci manualmente:');
  }
}

// Classifica i vini usando Claude (solo nomi, niente immagini)
async function classifyWines(){
  const key = getKey();
  if(!key){
    noStatus();
    renderRows();
    toast('✓ ' + rows.length + ' voci (classificazione vino locale)');
    return;
  }
  try{
    setStatus('Classificazione vini…');
    const nonDisc = rows.filter(r=>!r.isDiscount);
    const lista   = nonDisc.map((r,i)=>i+'. '+r.desc).join('\n');
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:512,
        messages:[{role:'user',content:`Questi prodotti sono di uno scontrino italiano.
Dimmi quali sono bevande alcoliche (vino, birra, superalcolici).
Rispondi SOLO con JSON: [{"i":0,"w":true},{"i":1,"w":false}]
dove i=indice, w=true se alcolico.

${lista}`}]
      })
    });
    if(resp.ok){
      const data = await resp.json();
      const txt  = (data.content||[]).map(b=>b.text||'').join('').trim();
      const m    = txt.match(/\[[\s\S]*\]/);
      if(m){
        const cls = JSON.parse(m[0]);
        cls.forEach(({i,w})=>{ if(nonDisc[i]) nonDisc[i].isWine=!!w; });
      }
    }
    noStatus();
    renderRows();
    const nv = rows.filter(r=>r.isWine).length;
    toast('✓ ' + rows.length + ' voci · ' + nv + ' vini');
  }catch(e){
    noStatus();
    console.error('classifyWines error:',e);
    renderRows();
    toast('✓ ' + rows.length + ' voci');
  }
}


function parseClaudeResponse(text){
  try{
    const match=text.match(/\[[\s\S]*\]/);
    if(!match)throw new Error('Nessun JSON');
    const data=JSON.parse(match[0]);
    if(!Array.isArray(data)||data.length===0)throw new Error('Array vuoto');
    rows=data
      .filter(it=>it.desc&&typeof it.price==='number'&&it.price!==0&&Math.abs(it.price)<9999)
      .map(it=>({desc:String(it.desc).trim(),price:Number(it.price),isWine:!!it.isWine,uncertain:false,isDiscount:it.price<0}));
    noStatus();
    if(rows.length===0){showManual('Nessuna voce trovata. Inserisci manualmente:');return;}
    renderRows();
    toast('✓ '+rows.length+' voci estratte');
  }catch(e){
    noStatus();
    console.error('Parse error:',e.message,'\nRaw:',text);
    showManual('Errore nel parsing. Inserisci manualmente:');
  }
}

function parseManual(){
  const txt=document.getElementById('manualText').value.trim();
  if(!txt){toast('Inserisci del testo prima');return;}
  rows=[];

  const skipRe=/^(totale|subtotale|di cui|^iva|pagamento|contanti|carta|bancomat|resto|importo|raccolta|saldo|spesa val|p\.iva|descrizione|codice|arrivederci|grazie|documento|barcode|oper\.|art\s|trn\s|neg\s|doc\s)/i;

  for(const line of txt.split('\n').map(l=>l.trim()).filter(Boolean)){
    if(line.length<3)continue;
    if(skipRe.test(line))continue;
    if(/^[-=*]{3,}/.test(line))continue;

    let desc=null, price=null;

    // Formato PAM: NOME   22,00%   -1,90
    const pamRe=/^(.+?)\s{2,}\d{1,2}[,.]\d{2}%\s+(-?\d{1,4}[,.]\d{2})\s*$/;
    let m=line.match(pamRe);
    if(m){desc=m[1].trim();price=parseFloat(m[2].replace(',','.'));}

    // Formato standard: NOME   8,45
    if(!m){
      const stdRe=/^(.+?)\s{2,}(-?\d{1,4}[,.]\d{2})\s*[€$]?\s*$/;
      m=line.match(stdRe);
      if(m){desc=m[1].trim();price=parseFloat(m[2].replace(',','.'));}
    }

    // Formato semplice: Descrizione 8.45
    if(!m){
      const simRe=/^(.+?)\s+(-?\d{1,4}[,.]\d{2})\s*$/;
      m=line.match(simRe);
      if(m){desc=m[1].trim();price=parseFloat(m[2].replace(',','.'));}
    }

    if(!desc||price===null||isNaN(price)||price===0||Math.abs(price)>999)continue;

    // Rimuovi prefisso lettera PAM
    desc=desc.replace(/^[TCXBFMR]\s+/,'').trim();
    // Rimuovi IVA residua
    desc=desc.replace(/\s+\d{1,2}[,.]\d{2}%\s*$/,'').trim();
    if(!desc||desc.length<2)continue;

    const isDiscount=price<0;
    const isWine=guessWine(desc);
    rows.push({desc,price,isWine,uncertain:false,isDiscount});
  }
  hideManual();
  if(rows.length===0){toast('Nessuna voce valida trovata');return;}

  // Prova a classificare i vini con Claude se abbiamo la key
  const key=getKey();
  if(key){
    classifyWinesWithClaude(key);
  } else {
    // Fallback locale
    rows.forEach(r=>{ if(!r.isDiscount) r.isWine=guessWine(r.desc); });
    renderRows();
    toast('✓ '+rows.length+' voci');
  }
}

async function classifyWinesWithClaude(key){
  setStatus('Classificazione vini con Claude…');
  try{
    const items=rows.filter(r=>!r.isDiscount).map((r,i)=>i+'. '+r.desc).join('\n');
    const resp=await callClaude(key,[{type:'text',text:`Analizza questi prodotti di uno scontrino italiano.
Per ognuno dimmi se è una bevanda alcolica (vino, birra, superalcolico) oppure no.
Rispondi SOLO con un array JSON: [{"i":0,"isWine":true}, {"i":1,"isWine":false}, ...]
dove "i" è il numero di riga (0-based tra i soli prodotti non-sconto).

Prodotti:
${items}

Considera alcolici: vini DOC/DOCG/IGT, vitigni italiani (Montepulciano, Friulano, Chianti,
Barolo, Prosecco, Lambrusco, Merlot, Cabernet, Sangiovese, Pinot, Vermentino, Soave,
Amarone, Primitivo, Verdicchio, Moscato, Barbera, Aglianico ecc.),
birre, grappa, amaro, gin, vodka, rum, whisky, limoncello, aperol, campari.
Solo JSON, nient'altro.`}], 512);

    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    const text=(data.content||[]).map(b=>b.text||'').join('').trim();
    const match=text.match(/\[[\s\S]*\]/);
    if(!match) throw new Error('no JSON');
    const classifications=JSON.parse(match[0]);

    // Applica classificazioni
    const nonDiscount=rows.filter(r=>!r.isDiscount);
    classifications.forEach(({i,isWine})=>{
      if(nonDiscount[i]) nonDiscount[i].isWine=!!isWine;
    });

    noStatus();
    renderRows();
    const nVini=rows.filter(r=>r.isWine).length;
    toast('✓ '+rows.length+' voci · '+nVini+' vini riconosciuti');
  } catch(e){
    noStatus();
    console.error('Wine classification error:', e);
    // Fallback locale silenzioso
    rows.forEach(r=>{ if(!r.isDiscount) r.isWine=guessWine(r.desc); });
    renderRows();
    toast('✓ '+rows.length+' voci');
  }
}

// Parser locale per testo scontrino (PDF estratto o testo incollato)
function parseReceiptText(text){
  const lines  = text.split('\n').map(l=>l.trim()).filter(l=>l.length>1);
  const parsed = [];
  const skipRe = /^(totale|subtotale|di cui|^iva\b|imposta|pagamento|pagam|contanti|contant|carta\b|bancomat|pos\b|resto\b|cambio|importo pag|receipt|benven|grazie|welcome|arriveder|documento comm|descrizione\b|raccolta|saldo|spesa val|punti accu|codice a|p\.iva|www\.|http|0[,.]30)/i;

  for(const line of lines){
    if(skipRe.test(line)) continue;
    if(/^[-=*_]{3,}/.test(line)) continue;

    let desc=null, price=null;

    // Formato PAM: NOME   22,00%   -1,90
    const pamRe = /^(.+?)\s{2,}\d{1,2}[,.]\d{2}%\s+(-?\d{1,4}[,.]\d{2})\s*$/;
    let m = line.match(pamRe);
    if(m){ desc=m[1].trim(); price=parseFloat(m[2].replace(',','.')); }

    // Formato standard: NOME   8,45
    if(!m){
      const stdRe = /^(.+?)\s{2,}(-?\d{1,4}[,.]\d{2})\s*[€$]?\s*$/;
      m = line.match(stdRe);
      if(m){ desc=m[1].trim(); price=parseFloat(m[2].replace(',','.')); }
    }

    // Formato semplice: Nome 8.45
    if(!m){
      const simRe = /^(.+?)\s+(-?\d{1,4}[,.]\d{2})\s*$/;
      m = line.match(simRe);
      if(m){ desc=m[1].trim(); price=parseFloat(m[2].replace(',','.')); }
    }

    if(!desc || price===null || isNaN(price) || price===0 || Math.abs(price)>999) continue;

    // Pulizia
    desc = desc.replace(/\s+\d{1,2}[,.]\d{2}%\s*$/,'').trim(); // rimuovi IVA residua
    desc = desc.replace(/^[TCXBFMR]\s+/,'').trim();             // rimuovi prefisso PAM
    if(!desc || desc.length<2) continue;

    const isDiscount = price < 0;
    parsed.push({desc, price, isWine: guessWine(desc), uncertain:false, isDiscount});
  }
  return parsed;
}

function guessWine(desc){
  const d=(desc+' ').toLowerCase();
  const kw=['vino','wine','rosso','bianco','rosato','prosecco','champagne','spumante',
    'frizzante','lambrusco','montepulciano','friulano','chianti','barolo','brunello',
    'merlot','cabernet','sangiovese','pinot','vermentino','ribolla','soave','amarone',
    'valpolicella','primitivo','verdicchio','moscato','barbera','dolcetto','nebbiolo',
    'aglianico','franciacorta','doc ','docg','igt ','birra','beer','lager','ipa',
    'weiss','pils','grappa','amaro','gin ','vodka','rum ','whisky','limoncello',
    'aperol','campari','spritz','bottiglia','bottigl'];
  return kw.some(k=>d.includes(k));
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function renderRows(){
  const list=document.getElementById('rowsList');
  list.innerHTML='';
  rows.forEach((r,i)=>{
    const div=document.createElement('div');
    div.className='row'+(r.uncertain?' uncertain':'');
    const pc=r.price<0?' neg':'';
    const tagHtml=r.isDiscount
      ?'<span class="tag disc">🏷 Sconto</span>'
      :r.isWine
        ?'<button class="tag wine on" onclick="toggleWine('+i+')">🍷 Vino</button>'
        :'<button class="tag food on" onclick="toggleWine('+i+')">🥗 Cibo</button>';
    div.innerHTML=
      '<input class="row-desc" value="'+esc(r.desc)+'" oninput="rows['+i+'].desc=this.value" placeholder="Descrizione">'+
      '<input class="row-price'+pc+'" type="number" step="0.01" value="'+r.price.toFixed(2)+'" oninput="rows['+i+'].price=parseFloat(this.value)||0;this.className=\'row-price\'+(rows['+i+'].price<0?\' neg\':\'\')">'+
      tagHtml+
      '<button class="row-del" onclick="rows.splice('+i+',1);renderRows()" title="Rimuovi">✕</button>';
    list.appendChild(div);
  });
  document.getElementById('rowsCount').textContent=rows.length+' voci';
  document.getElementById('rowsSection').classList.add('on');
  document.getElementById('resultSection').classList.remove('on');
}

function toggleWine(i){rows[i].isWine=!rows[i].isWine;rows[i].uncertain=false;renderRows();}

function addRow(){
  rows.push({desc:'',price:0,isWine:false,uncertain:false,isDiscount:false});
  renderRows();
  setTimeout(()=>{const ins=document.querySelectorAll('.row-desc');ins[ins.length-1]?.focus();},50);
}

function calcola(){
  const wG=rows.filter(r=>r.isWine&&r.price>0).reduce((s,r)=>s+r.price,0);
  const fG=rows.filter(r=>!r.isWine&&r.price>0).reduce((s,r)=>s+r.price,0);
  const dT=rows.filter(r=>r.price<0).reduce((s,r)=>s+r.price,0);
  const gross=wG+fG;
  const wR=gross>0?wG/gross:0;
  const wine=wG+dT*wR;
  const food=fG+dT*(1-wR);
  const total=wine+food;
  const fS=food/3,wS=wine/2;
  const A=fS+wS,B=fS+wS,C=fS;
  let tH='<div class="total-box wine"><div class="lbl">🍷 Totale Vino</div><div class="val">€'+wine.toFixed(2)+'</div></div>'+
    '<div class="total-box food"><div class="lbl">🥗 Totale Cibo</div><div class="val">€'+food.toFixed(2)+'</div></div>';
  if(dT<0)tH+='<div class="total-box disc"><div class="lbl">🏷 Sconti applicati</div><div class="val">−€'+Math.abs(dT).toFixed(2)+'</div></div>';
  document.getElementById('totals').innerHTML=tH;
  document.getElementById('personas').innerHTML=
    mkP('A','av-a',A,fS,wS)+mkP('B','av-b',B,fS,wS)+mkP('C','av-c',C,fS,null);
  document.getElementById('grand').innerHTML=
    '<div><div class="lbl">Totale scontrino</div><div class="sub">'+rows.length+' voci · A+B+C = €'+(A+B+C).toFixed(2)+'</div></div>'+
    '<div class="val">€'+total.toFixed(2)+'</div>';
  document.getElementById('resultSection').classList.add('on');
  document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'start'});
}

function mkP(n,av,tot,fS,wS){
  const sub=wS!=null?'Cibo €'+fS.toFixed(2)+' + Vino €'+wS.toFixed(2):'Solo cibo €'+fS.toFixed(2);
  return'<div class="persona"><div class="avatar '+av+'">'+n+'</div><div class="persona-info"><div class="persona-name">Persona '+n+'</div><div class="persona-sub">'+sub+'</div></div><div class="persona-amt">€'+tot.toFixed(2)+'</div></div>';
}

function noStatus(){document.getElementById('statusBar').classList.remove('on');}
let tT;
